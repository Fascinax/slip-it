<form [formGroup]="form">
  <ion-list>
    <ion-item>
      <ion-label>Mode de jeu</ion-label>
      <ion-select formControlName="mode" slot="end" interface="popover">
        <ion-select-option [value]="GameMode.POINTS">🏆 Points</ion-select-option>
        <ion-select-option [value]="GameMode.DRINK">🍺 Boisson</ion-select-option>
        <ion-select-option [value]="GameMode.CUSTOM">✏️ Personnalisé</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label>Nombre de manches</ion-label>
      <ion-select formControlName="totalRounds" slot="end" interface="popover">
        <ion-select-option [value]="1">1 manche</ion-select-option>
        <ion-select-option [value]="2">2 manches</ion-select-option>
        <ion-select-option [value]="3">3 manches</ion-select-option>
        <ion-select-option [value]="5">5 manches</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label>Difficulté des mots</ion-label>
      <ion-select formControlName="wordDifficulty" slot="end" interface="popover">
        <ion-select-option value="EASY">😊 Facile</ion-select-option>
        <ion-select-option value="MEDIUM">😐 Moyen</ion-select-option>
        <ion-select-option value="HARD">😈 Difficile</ion-select-option>
        <ion-select-option value="MIXED">🎲 Mixte</ion-select-option>
      </ion-select>
    </ion-item>
  </ion-list>
</form>
